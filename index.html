<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian MP Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        img {
            max-width: 300px;
            max-height: 350px;
            margin: 15px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        #quiz,
        #results {
            display: none;
        }
    </style>

    <!-- LOAD MP DATA HERE -->
    <script src="mps.js"></script>

</head>

<body>

    <h1>Canadian MP Quiz</h1>

    <div id="menu">

        <h2>Last Name Quiz</h2>

        <button onclick="startQuiz('lastname', false)">
            All MPs
        </button>

        <button onclick="startQuiz('lastname', true)">
            20 Random MPs
        </button>

        <h2>Party Quiz</h2>

        <button onclick="startQuiz('party', false)">
            All MPs
        </button>

        <button onclick="startQuiz('party', true)">
            20 Random MPs
        </button>

        
        <h2>Same Surname Challenge</h2>
        
        <button onclick="startQuiz('surnamechallenge', false)">
            All Shared-Surname MPs
        </button>


    </div>

    <div id="quiz">

        <h2 id="questionTitle"></h2>

        <img id="photo" alt="MP Photo">

        <div id="nameDisplay"></div>

        
        <input id="answer" type="text">
        
        <input
            id="constituencyAnswer"
            type="text"
            placeholder="Constituency"
            style="display:none">


        <br>

        <button onclick="submitAnswer()">
            Submit
        </button>

        
        <button onclick="goHome()">
            Home
        </button>


        <p id="progress"></p>

    </div>

    <div id="results">

        <h2>Quiz Complete!</h2>

        <p id="score"></p>

        
        <button onclick="goHome()">
            Return to Home Screen
        </button>


    </div>

    <script>

        console.log("MP count:", MPs.length);

        let quizData = [];
        let current = 0;
        let score = 0;
        let mode = "lastname";

        
        
        function goHome() {
        
            current = 0;
            score = 0;
            quizData = [];
        
            document.getElementById("quiz").style.display = "none";
            document.getElementById("results").style.display = "none";
            document.getElementById("menu").style.display = "block";
        
            document.getElementById("answer").value = "";
        }

        
        function shuffle(array) {

            let arr = [...array];

            for (let i = arr.length - 1; i > 0; i--) {

                let j = Math.floor(Math.random() * (i + 1));

                [arr[i], arr[j]] = [arr[j], arr[i]];
            }

            return arr;
        }

        
        function getSharedSurnameMPs() {
        
            const counts = {};
        
            MPs.forEach(mp => {
                counts[mp.lastName] =
                    (counts[mp.lastName] || 0) + 1;
            });
        
            return MPs.filter(mp =>
                counts[mp.lastName] > 1
            );
        }
        

        function startQuiz(selectedMode, random20) {

            mode = selectedMode;

            
            if (selectedMode === "surnamechallenge") {
            
                quizData =
                    shuffle(getSharedSurnameMPs());
            
            } else {
            
                quizData = shuffle(MPs);
            
            }


            if (random20) {
                quizData = quizData.slice(0, 20);
            }

            current = 0;
            score = 0;

            document.getElementById("menu").style.display = "none";
            document.getElementById("quiz").style.display = "block";

            loadQuestion();
        }

        function loadQuestion() {

            document.getElementById(
                "constituencyAnswer"
            ).style.display = "none";
            
            let mp = quizData[current];

            document.getElementById("photo").src = mp.photo;

            if (mode === "lastname") {

                document.getElementById("questionTitle").textContent =
                    "Type the MP's Last Name";

                document.getElementById("nameDisplay").textContent = "";

            }   else if (mode === "surnamechallenge") {
            
                document.getElementById("questionTitle")
                    .textContent =
                    "Enter the MP's full name and constituency";
            
                document.getElementById("nameDisplay")
                    .textContent = "";
            
                document.getElementById("answer")
                    .placeholder = "Full Name";
            
                document.getElementById(
                    "constituencyAnswer"
                ).style.display = "inline-block";
                
            }   else {

                document.getElementById("questionTitle").textContent =
                    "Type the MP's Party";

                document.getElementById("nameDisplay").textContent =
                    mp.firstName + " " + mp.lastName;
            }

            document.getElementById("progress").textContent =
                "Question " + (current + 1) + " of " + quizData.length;

            document.getElementById("answer").value = "";

            document.getElementById(
                "constituencyAnswer"
            ).value = "";
        }

        function submitAnswer() {

            let mp = quizData[current];

            let answer =
                document.getElementById("answer").value.trim();

            let correct;

            if (mode === "lastname") {
                correct = mp.lastName;
            } else {
                correct = mp.party;
            }

            console.log("Answer:", answer);
            console.log("Correct:", correct);

            
            if (mode === "surnamechallenge") {

                let nameAnswer =
                    document.getElementById("answer")
                        .value
                        .trim()
                        .toLowerCase();
            
                let constituencyAnswer =
                    document.getElementById(
                        "constituencyAnswer"
                    )
                    .value
                    .trim()
                    .toLowerCase();

            
                let correctName =
                    (
                        mp.firstName +
                        " " +
                        mp.lastName
                    )
                    .toLowerCase();
            
                let correctConstituency =
                    mp.constituency.toLowerCase();

                console.log("Name Answer:", nameAnswer);
                console.log("Name Correct:", correctName);
                console.log("Constituency Answer:", constituencyAnswer);
                console.log("Constituency Correct:", correctConstituency);
            
                if (
                    nameAnswer === correctName &&
                    constituencyAnswer ===
                        correctConstituency
                ) {
                    score++;
                }
            
            } else {
            
                if (
                    answer.trim().toLowerCase() ===
                    correct.trim().toLowerCase()
                ) {
                    score++;
                }
            }


            current++;

            if (current >= quizData.length) {

                document.getElementById("quiz").style.display = "none";
                document.getElementById("results").style.display = "block";

                document.getElementById("score").textContent =
                    score + " / " + quizData.length;

                return;
            }

            loadQuestion();
        }

    </script>

</body>

</html>
